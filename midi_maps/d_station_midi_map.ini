# Novation D-Station MIDI map (from D-Station User Guide EN)
# Strict sectioned INI for ConfigNative.parse().
# Parsed keys are flattened as "section.key".
#
# Source sections used:
# - Controller Map (manual p42-43)
# - MIDI Implementation (manual p46)
# - MIDI Percussion Maps (manual p47)

[global]
vendor = Novation
device = D-Station

[device]
alias = Drum Station 2

[manual]
language = EN
version = 1.0
date = 1996-05-10

# ── MIDI implementation summary ────────────────────────────────────────────────

[midi.channel]
rx = 1-16
tx = 1-16

[midi.note]
range = 12-120

[midi.note_on]
velocity = 1-127

[midi.note_off]
supported = true

[midi.aftertouch]
channel = false
poly = false

[midi]
pitch_bend = false

[midi.cc]
7 = volume
parameter_range = 20-119

[midi.program_change]
range = 0-39

[midi.sysex]
voice_parameters = true

[midi.realtime.rx]
clock = false

[midi.realtime.tx]
clock = true
transport = start,stop,continue

