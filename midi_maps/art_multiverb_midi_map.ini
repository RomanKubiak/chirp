# ART Multiverb MIDI map (from Multiverb Owner's Manual)
# Strict sectioned INI for ConfigNative.parse().
# Parsed keys are flattened as "section.key".

[global]
vendor = ART
device = Multiverb
manual.title = Multiverb Owner's Manual
manual.pages = 59

[midi.receive]
channel = 1-16,omni,off
omni = on,off
midi_merger = supported

[midi.program_change]
supported = true
status_format = Cx dd
routing = via_midi_program_table
mpt.size = 128
mpt.preset_range = 0-199
bypass_preset = 100

[midi.control_change]
general_mapping = not_documented

[midi.note]
input = not_documented

[midi.pitch_bend]
supported = not_documented

[midi.aftertouch]
supported = not_documented

[midi.channel_mode]
omni_off = Bx 7C 00
omni_on = Bx 7D 00

[midi.sysex]
supported = true
manufacturer_id_hex = 1A
# Manual OCR shows one conflicting byte in one sentence (04 vs 05).
# Command examples consistently use 05.
product_family_hex = 05
frame = F0 1A 0x 05 ... F7

[midi.sysex.command]
set_bypass = F0 1A 0x 05 03 00 xx F7
set_bypass.xx.00 = off
set_bypass.xx.01 = on
request_all_presets = F0 1A 0x 05 4B F7
load_all_presets = F0 1A 0x 05 0B <200x29_bytes> F7
request_mpt = F0 1A 0x 05 40 F7
set_mpt = F0 1A 0x 05 0C <128x2_bytes> F7

[midi.mpt]
entry_size_bytes = 2
entry_encoding = lsb_7bit_then_msb
midi_program_0 = user_assignable
midi_program_127 = user_assignable

[notes]
1 = Manual does not provide a TR-style CC-per-parameter controller table.
2 = MIDI implementation centers on Program Change + MPT + SysEx dumps/commands.
3 = Use front-panel utility for send_preset, send_mpt, send_all_presets.
